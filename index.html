<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
 <h1>Cadastro de usuário</h1>
  <form action="/enviar-cadastro" method="POST" class="formulario-cadastro">

  <fieldset class="grupo-campos">
    <legend class="legenda-grupo">Informações Pessoais</legend>

    <div class="campo-item">
      <label for="nome" class="rotulo">Nome Completo:</label>
      <input type="text" id="nome" name="nome" class="entrada-texto" required>
    </div>

    <div class="campo-item">
      <label for="email" class="rotulo">E-mail:</label>
      <input type="email" id="email" name="email" class="entrada-texto" required>
    </div>
  </fieldset>

  <fieldset class="grupo-campos">
    <legend class="legenda-grupo">Segurança</legend>
    
    <div class="campo-item">
      <label for="senha" class="rotulo">Senha:</label>
      <input type="password" id="senha" name="senha" class="entrada-texto" required minlength="8">
    </div>
  </fieldset>

  <button type="submit" class="botao-enviar">Finalizar Cadastro</button>
</form>

</body>
</html>
