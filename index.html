<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formulário de Cadastro</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main>
    <h1>Formulário de Cadastro</h1>

    <form id="form-cadastro" novalidate>

      <fieldset>
        <legend>Informações Pessoais</legend>

        <p>
          <label for="nome">Nome completo <span class="required">*</span></label>
          <span id="descricao-nome" class="hint">Digite seu nome completo</span>
          <input type="text" id="nome" name="nome" aria-required="true" aria-describedby="descricao-nome">
          <div id="erro-nome" class="error" aria-live="polite"></div>
        </p>

        <fieldset>
          <legend>Gênero <span class="required">*</span></legend>
          <label><input type="radio" name="genero" value="masculino"> Masculino</label>
          <label><input type="radio" name="genero" value="feminino"> Feminino</label>
          <label><input type="radio" name="genero" value="outro"> Outro</label>
          <div id="erro-genero" class="error" aria-live="polite"></div>
        </fieldset>

      </fieldset>

      <fieldset>
        <legend>Contato</legend>

        <p>
          <label for="email">E-mail <span class="required">*</span></label>
          <span id="descricao-email" class="hint">Digite seu e-mail</span>
          <input type="email" id="email" name="email" aria-required="true" aria-describedby="descricao-email">
          <div id="erro-email" class="error" aria-live="polite"></div>
        </p>

        <p>
          <label for="telefone">Telefone</label>
          <span id="descricao-telefone" class="hint">Digite seu telefone (opcional)</span>
          <input type="tel" id="telefone" name="telefone" aria-describedby="descricao-telefone">
          <div id="erro-telefone" class="error" aria-live="polite"></div>
        </p>

      </fieldset>

      <fieldset>
        <legend>Endereço</legend>

        <p>
          <label for="cep">CEP</label>
          <span id="descricao-cep" class="hint">Digite o CEP (opcional)</span>
          <input type="text" id="cep" name="cep" aria-describedby="descricao-cep">
          <div id="erro-cep" class="error" aria-live="polite"></div>
        </p>

        <p>
          <label for="rua">Rua</label>
          <span id="descricao-rua" class="hint">Digite sua rua (opcional)</span>
          <input type="text" id="rua" name="rua" aria-describedby="descricao-rua">
          <div id="erro-rua" class="error" aria-live="polite"></div>
        </p>

        <p>
          <label for="cidade">Cidade</label>
          <span id="descricao-cidade" class="hint">Digite sua cidade (opcional)</span>
          <input type="text" id="cidade" name="cidade" aria-describedby="descricao-cidade">
          <div id="erro-cidade" class="error" aria-live="polite"></div>
        </p>

        <p>
          <label for="estado">Estado</label>
          <span id="descricao-estado" class="hint">Selecione seu estado</span>
          <select id="estado" name="estado" aria-describedby="descricao-estado">
            <option value="">Selecione</option>
            <option value="AC">Acre</option>
            <option value="AL">Alagoas</option>
            <option value="AP">Amapá</option>
            <option value="AM">Amazonas</option>
            <option value="BA">Bahia</option>
            <option value="CE">Ceará</option>
            <option value="DF">Distrito Federal</option>
            <option value="ES">Espírito Santo</option>
            <option value="GO">Goiás</option>
            <option value="MA">Maranhão</option>
            <option value="MT">Mato Grosso</option>
            <option value="MS">Mato Grosso do Sul</option>
            <option value="MG">Minas Gerais</option>
            <option value="PA">Pará</option>
            <option value="PB">Paraíba</option>
            <option value="PR">Paraná</option>
            <option value="PE">Pernambuco</option>
            <option value="PI">Piauí</option>
            <option value="RJ">Rio de Janeiro</option>
            <option value="RN">Rio Grande do Norte</option>
            <option value="RS">Rio Grande do Sul</option>
            <option value="RO">Rondônia</option>
            <option value="RR">Roraima</option>
            <option value="SC">Santa Catarina</option>
            <option value="SP">São Paulo</option>
            <option value="SE">Sergipe</option>
            <option value="TO">Tocantins</option>
          </select>
          <div id="erro-estado" class="error" aria-live="polite"></div>
        </p>

      </fieldset>

      <div class="checkbox-group">
        <input type="checkbox" id="termos" name="termos" aria-required="true">
        <label for="termos">Aceito os termos de uso <span class="required">*</span></label>
        <div id="erro-termos" class="error" aria-live="polite"></div>
      </div>

      <div class="actions">
        <button type="submit">Finalizar cadastro</button>
      </div>

    </form>
  </main>

  <script src="script.js"></script>
</body>
</html>
