<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formulário de Cadastro</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1 id="titulo-form">Formulário de Cadastro</h1>

  <a href="tabela.html"
   class="botao-link"
   role="button"
   aria-label="Ir para a tabela de filmes da Barbie"
   title="Ir para a tabela">
  TABELA
</a> 

  <form id="form" aria-labelledby="titulo-form" novalidate>

    <fieldset aria-labelledby="legend-dados">
      <legend id="legend-dados">Dados pessoais</legend>

      <label for="nome" id="label-nome">Nome completo *</label>
      <input type="text" id="nome" name="nome" required
             aria-labelledby="label-nome"
             aria-required="true"
             aria-describedby="erro-nome"
             aria-label="Digite seu nome completo">
      <span id="erro-nome" class="erro" role="alert" hidden>
        Informe seu nome completo.
      </span>

      <fieldset aria-labelledby="legend-genero">
        <legend id="legend-genero">Gênero *</legend>

        <label>
          <input type="radio" name="genero" value="masculino" required
                 aria-required="true"
                 aria-describedby="erro-genero"
                 aria-label="Masculino">
          Masculino
        </label>

        <label>
          <input type="radio" name="genero" value="feminino"
                 aria-label="Feminino">
          Feminino
        </label>

        <label>
          <input type="radio" name="genero" value="outro"
                 aria-label="Outro">
          Outro
        </label>

        <span id="erro-genero" class="erro" role="alert" hidden>
          Selecione um gênero.
        </span>
      </fieldset>

      <label for="email" id="label-email">E-mail *</label>
      <input type="email" id="email" name="email" required
             aria-labelledby="label-email"
             aria-required="true"
             aria-describedby="erro-email"
             aria-label="Digite seu e-mail">
      <span id="erro-email" class="erro" role="alert" hidden>
        Informe um e-mail válido.
      </span>

      <label for="telefone" id="label-telefone">Telefone</label>
      <input type="tel" id="telefone" name="telefone"
             aria-labelledby="label-telefone"
             aria-label="Digite seu telefone">

    </fieldset>

    <fieldset aria-labelledby="legend-endereco">
      <legend id="legend-endereco">Endereço</legend>

      <label for="cep" id="label-cep">CEP</label>
      <input type="text" id="cep" name="cep"
             aria-labelledby="label-cep"
             aria-label="Digite seu CEP">

      <label for="rua" id="label-rua">Rua</label>
      <input type="text" id="rua" name="rua"
             aria-labelledby="label-rua"
             aria-label="Digite sua rua">

      <label for="cidade" id="label-cidade">Cidade</label>
      <input type="text" id="cidade" name="cidade"
             aria-labelledby="label-cidade"
             aria-label="Digite sua cidade">

      <label for="estado" id="label-estado">Estado *</label>
      <select id="estado" name="estado" required
              aria-labelledby="label-estado"
              aria-required="true"
              aria-describedby="erro-estado"
              aria-label="Selecione seu estado">
        <option value="">Selecione</option>
        <option>AC</option><option>AL</option><option>AP</option><option>AM</option>
        <option>BA</option><option>CE</option><option>DF</option><option>ES</option>
        <option>GO</option><option>MA</option><option>MT</option><option>MS</option>
        <option>MG</option><option>PA</option><option>PB</option><option>PR</option>
        <option>PE</option><option>PI</option><option>RJ</option><option>RN</option>
        <option>RS</option><option>RO</option><option>RR</option><option>SC</option>
        <option>SP</option><option>SE</option><option>TO</option>
      </select>
      <span id="erro-estado" class="erro" role="alert" hidden>
        Selecione um estado.
      </span>

    </fieldset>

    <button type="submit">Finalizar cadastro</button>

    <p id="sucesso" role="status" aria-live="polite"></p>

  </form>
  <script src="script.js"></script>
</body>
</html>
